<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NDigital</title>
    <script>
      // Single Page Apps for GitHub Pages – spa-github-pages technique
      // Redirects /NDigital/some/path → /NDigital/?/some/path so that
      // index.html (the SPA entry point) is served and React Router can
      // handle the path after app bootstrap.
      var pathSegmentsToKeep = 1; // keep the '/NDigital' repo segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
